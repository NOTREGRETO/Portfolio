# Deploy portfolio to GitHub Pages using npm
# yarn.lock was removed from this project; using npm with package-lock.json instead.

name: Deploy Portfolio

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository 📦
        uses: actions/checkout@v4

      - name: Use Node.js 18.x 🟢
        uses: actions/setup-node@v4
        with:
          node-version: "18.x"
          cache: "npm"

      - name: Install Dependencies 🥁
        run: npm ci

      - name: Build Project 🧱
        run: npm run build
        env:
          NEXT_PUBLIC_TRACKING_ID: G-8FBXBFXC10
          NEXT_PUBLIC_SERVICE_ID: service_qt4ryip
          NEXT_PUBLIC_TEMPLATE_ID: template_2ni69n8
          NEXT_PUBLIC_USER_ID: user_Do31sKneP4eYfn5n1nLTD

      - name: Export Static Files 🎪
        run: npm run export

      - name: Add .nojekyll
        run: touch ./out/.nojekyll

      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: out

